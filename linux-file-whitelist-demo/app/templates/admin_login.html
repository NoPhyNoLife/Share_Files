<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理员登录</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell narrow">
      <section class="card">
        <p class="eyebrow">Admin Access</p>
        <h1>管理员登录</h1>
        {% if error %}
        <p class="notice danger">密码错误，请重试。</p>
        {% endif %}
        <form class="grid-form" action="/admin/login" method="post">
          <label class="full">
            <span>后台密码</span>
            <input name="password" type="password" required />
          </label>
          <button type="submit">登录</button>
        </form>
      </section>
    </main>
  </body>
</html>
